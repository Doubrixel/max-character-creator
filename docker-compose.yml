services:
  app:
    image: ghcr.io/doubrixel/max-character-creator:main
    build: .
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=file:///app/data/sqlite.db
    restart: unless-stopped

volumes:
  sqlite-data:
